# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "03cccdd9479bd45fe02e377e43b8c3b5"
name = "Cascade"
application_url = "https://cascade-app-off6g.ondigitalocean.app"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_inventory,write_inventory,read_content,write_content,read_online_store_navigation,write_online_store_navigation,read_files,write_files"
use_legacy_install_flow = false

[auth]
redirect_urls = ["https://cascade-app-off6g.ondigitalocean.app/auth/callback"]

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = ["app/uninstalled", "app/scopes_update"]
compliance_topics = ["customers/redact", "customers/data_request", "shop/redact"]
uri = "/webhooks"

# automatically_update_urls_on_dev is DISABLED. The deployed DigitalOcean URL
# is the source of truth for application_url / redirect_urls. See AD-006 and
# docs/DEPLOYMENT.md. Do not flip this back to true — it will silently rewrite
# application_url to a Cloudflare tunnel URL the next time `shopify app dev` runs.
[build]
automatically_update_urls_on_dev = false
dev_store_url = "steadro-dev-2.myshopify.com"
