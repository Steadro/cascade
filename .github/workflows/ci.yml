name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  CI:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validate Prisma
        env:
          # prisma validate needs DATABASE_URL set just to parse schema.prisma's
          # `url = env("DATABASE_URL")` line. No actual connection is attempted.
          # Real DATABASE_URL lives in DigitalOcean App Platform env vars.
          DATABASE_URL: "postgresql://validate:validate@localhost:5432/validate?sslmode=disable"
        run: npx prisma generate && npx prisma validate

      - name: Build
        run: npm run build
